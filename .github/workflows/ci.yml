name: CI

on:
  push:
    branches: ["*"]
    tags:     ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full history so `git describe` produces a meaningful version string.
          fetch-depth: 0

      - name: Install nfpm
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' \
            | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq nfpm

      - name: Build test images
        run: python3 test/create-images.py

      - name: Show docker images
        run: docker images --format=table

      - name: Run tests
        run: python3 test/run-tests.py --verbose

  release:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install nfpm
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' \
            | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq nfpm

      - name: Build .deb
        run: python3 build/build.py

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          files: |
            build/apt-signing-key-exporter_*.deb
            build/apt_signing_key_exporter.py
